name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  google-workspace-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcps/google-workspace/package-lock.json
      - run: npm ci
        working-directory: mcps/google-workspace
      - run: npm test
        working-directory: mcps/google-workspace

  python-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e450dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e450dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: VantaSoft/vantasoft-hermes-agent
          ref: a035fe2c7e298ab31753dbc99079f089f1a13bcf
          path: .hermes-runtime
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .hermes-runtime pytest ruff pyyaml
      - run: python -m ruff check plugins templates tests
      - run: PYTHONPATH=.hermes-runtime python -m pytest -q tests
